# Fixed Compose project name — avoids container/volume collisions with other VPS apps.
# Deploy from this directory only: `docker compose -p fratelanza up -d --build`
name: fratelanza

# =====================================================================
# Fratelanza — full stack on one VPS, from one git repo.
#
# Runs FOUR containers:
#   - db          Postgres for CRM (and tenant DBs)
#   - app         CRM (https://*.fratelanza.com)
#   - admin-db    Postgres for the admin control plane
#   - admin-app   Admin (https://admin.fratelanza.com)
#
# Deploy:
#   git clone https://github.com/Refaat1942/Fratelanza-HUB.git
#   cd Fratelanza-HUB
#   cp .env.example .env       # edit the CHANGE_ME values
#   docker compose up -d --build
# =====================================================================

services:
  # -------------------- CRM Postgres --------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fratelanza
      POSTGRES_USER: fratelanza
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fratelanza"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- CRM app --------------------
  app:
    build: .
    restart: unless-stopped
    ports:
      # Loopback only — nginx on the host fronts this.
      - "127.0.0.1:1025:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://fratelanza:${POSTGRES_PASSWORD}@db:5432/fratelanza
      STATIC_DIR: /app/artifacts/fratelanza-hub/dist/public
      SESSION_SECRET: ${SESSION_SECRET}
      # Multi-tenancy: CRM looks up tenants from the admin service on the
      # same docker network.
      ADMIN_API_URL: http://admin-app:5050
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      TENANT_DB_URL_TEMPLATE: postgresql://fratelanza:${POSTGRES_PASSWORD}@db:5432/{db}
      # Persist user-uploaded files (rental documents, etc.) outside the
      # container so `docker compose up --build` doesn't wipe them.
      UPLOAD_DIR: /app/uploads
    volumes:
      # Bind mount to a host folder so backups can just tar this directory
      # directly (no docker volume gymnastics needed).
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      admin-app:
        condition: service_started

  # -------------------- Admin Postgres --------------------
  admin-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fratelanza_admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD}
    volumes:
      - admin_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- Admin app --------------------
  admin-app:
    build: ./artifacts/fratelanza-admin
    restart: unless-stopped
    ports:
      # Loopback only — nginx on the host fronts this.
      - "127.0.0.1:2025:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      # Admin's OWN metadata DB (customers, feature flags, sessions).
      DATABASE_URL: postgresql://admin:${ADMIN_DB_PASSWORD}@admin-db:5432/fratelanza_admin
      SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Must match ADMIN_API_KEY on the CRM service above.
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # Tells the admin where to provision new customer DBs: same Postgres
      # the CRM uses. The `fratelanza` user already has CREATEDB by virtue
      # of being the database owner, so no extra grant is needed.
      TENANT_MAINTENANCE_DB_URL: postgresql://fratelanza:${POSTGRES_PASSWORD}@db:5432/postgres
      TENANT_DB_URL_TEMPLATE: postgresql://fratelanza:${POSTGRES_PASSWORD}@db:5432/{db}
      TENANT_DEFAULT_ADMIN_PASSWORD: ${TENANT_DEFAULT_ADMIN_PASSWORD:-admin123}
    depends_on:
      admin-db:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data:
  admin_db_data:
