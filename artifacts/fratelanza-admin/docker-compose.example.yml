# Example docker-compose.yml for running Fratelanza Admin on your VPS.
# Save this file as `docker-compose.yml` in the root of the new Fratelanza-Admin repo.
#
# Notes:
# - Uses its own dedicated Postgres container so admin data is isolated from CRM data.
# - Change all passwords before deploying.
# - Listens on host port 2025 (admin only) — set up your firewall / Nginx to expose it.

services:
  admin-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
      POSTGRES_DB: fratelanza_admin
    volumes:
      - admin_db_data:/var/lib/postgresql/data
    # No host port exposed — only reachable from inside docker network

  admin-app:
    build: .
    restart: always
    depends_on:
      - admin-db
    environment:
      DATABASE_URL: postgres://admin:CHANGE_ME_DB_PASSWORD@admin-db:5432/fratelanza_admin
      SESSION_SECRET: CHANGE_ME_SESSION_SECRET_LONG_RANDOM_STRING
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: CHANGE_ME_LOGIN_PASSWORD
      ADMIN_API_KEY: CHANGE_ME_API_KEY_FOR_CRM_LOOKUPS
      PORT: 5050
    ports:
      - "2025:5050"

volumes:
  admin_db_data:
