# =====================================================================
# Fratelanza RS — separate app (not Hub CRM)
#
# Routes rs.fratelanza.com -> host port 9000
# Install alongside deploy/nginx.conf (Hub must NOT catch rs subdomain).
#
#   sudo cp deploy/nginx-rs.conf /etc/nginx/sites-available/fratelanza-rs
#   sudo ln -sf /etc/nginx/sites-available/fratelanza-rs \
#               /etc/nginx/sites-enabled/fratelanza-rs
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rs.fratelanza.com;

    ssl_certificate     /etc/letsencrypt/live/fratelanza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fratelanza.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
