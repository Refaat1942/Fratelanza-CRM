# =====================================================================
# Fratelanza Hub — Nginx config for VPS (Phase 4)
#
# Routes:
#   *.fratelanza.com         -> CRM app   (host docker port 1025)
#   fratelanza.com           -> CRM marketing/login (same app)
#   admin.fratelanza.com     -> Admin app (host docker port 2025)
#
# Required certificates (Let's Encrypt):
#   /etc/letsencrypt/live/fratelanza.com/fullchain.pem
#   /etc/letsencrypt/live/fratelanza.com/privkey.pem
#   ^ a SINGLE wildcard cert covering: fratelanza.com, *.fratelanza.com,
#     admin.fratelanza.com — issued via DNS-01 (see deploy/setup-ssl.sh).
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/fratelanza
#   sudo ln -sf /etc/nginx/sites-available/fratelanza \
#               /etc/nginx/sites-enabled/fratelanza
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================================

# --- HTTP -> HTTPS redirect (covers apex, all subdomains, admin) ---
server {
    listen 80;
    listen [::]:80;
    server_name fratelanza.com *.fratelanza.com admin.fratelanza.com;

    # Allow certbot http-01 renewal fallback if you ever switch from DNS-01.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Admin control plane ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.fratelanza.com;

    ssl_certificate     /etc/letsencrypt/live/fratelanza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fratelanza.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:2025;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}

# --- CRM (every customer subdomain + the apex) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # Matches fratelanza.com and any single-label subdomain except admin.
    server_name fratelanza.com *.fratelanza.com;

    # Defensive: if someone hits admin.fratelanza.com here, send them away
    # (the more-specific admin server above should already win).
    if ($host = admin.fratelanza.com) {
        return 404;
    }

    ssl_certificate     /etc/letsencrypt/live/fratelanza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fratelanza.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:1025;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;

        # CRITICAL for multi-tenancy: the CRM resolves the tenant from
        # the Host header (subdomain). Must be passed through unchanged.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
